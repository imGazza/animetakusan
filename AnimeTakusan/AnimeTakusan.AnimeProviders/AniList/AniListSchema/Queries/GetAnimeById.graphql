query GetAnimeById($id: Int) { 
  Media (id: $id, type: ANIME) { 
    ...Anime
    relations {    
      edges {
        relationType(version: 2)
        node {
          id
          coverImage {
            extraLarge,
            color
          }
          title {
            english
            native
            romaji
          }
        }
      }
    }
  }
}