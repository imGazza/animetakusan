query GetAnimeById($id: Int) { 
  Media (id: $id, type: ANIME) { 
    ...Anime
    popularity
    favourites
    source(version: 3)
    relations {    
      edges {
        relationType(version: 2)
        node {
          id
          coverImage {
            large,
            color
          }
          title {
            english
            native
            romaji
          }
          format
          status(version: 2)
          type
        }
      }
    }
    recommendations(sort: RATING_DESC, page: 1, perPage: 21) {
      nodes {
        mediaRecommendation {
          id
          coverImage {
            large,
            color
          }
          title {
            english
            native
            romaji
          }
          averageScore
        }
      }
    }
    reviews(sort: RATING_DESC, page: 1, perPage: 50) {
      nodes {
        ratingAmount
        rating
        score
        summary
        siteUrl
        user {
          avatar {
            medium
          }
          name
        }
      }
    }
    rankings {
      allTime
      context
      rank
      season
      type
      year
    }
  }
}