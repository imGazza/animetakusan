query GetAnimeById($id: Int) { 
  Media (id: $id, type: ANIME) { 
    ...Anime
    popularity
    favourites
    source(version: 3)
    relations {    
      edges {
        relationType(version: 2)
        node {
          id
          coverImage {
            large,
            color
          }
          title {
            english
            native
            romaji
          }
          format
          status(version: 2)
        }
      }
    }
    recommendations(sort: RATING_DESC, page: 1, perPage: 10) {
      nodes {
        mediaRecommendation {
          id
          coverImage {
            large,
            color
          }
          title {
            english
            native
            romaji
          }
          averageScore
        }
      }
    }
  }
}